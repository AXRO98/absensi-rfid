{% extends 'layouts/base-auth.html' %}

{% block title %} Error 401 - Unauthorized {% endblock title %}

{% block content %}

    <div class="auth-wrapper">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="text-center">
                        <img src="{{ url_for('static', filename='assets/images/error/generic.png') }}" 
                             alt="Error 401" class="img-fluid">
                        <h5 class="text-muted my-4">Unauthorized Access</h5>
                        <p class="text-muted">
                            You must log in to view this page.
                        </p>
                        <a href="{{ url_for('authentication_blueprint.login') }}" class="btn btn-primary mb-4">
                            <i class="feather icon-log-in me-2"></i>Go to Login
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

{% endblock content %}
