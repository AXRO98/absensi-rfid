{% extends 'layouts/base-auth.html' %}

{% block title %} Error 405 - Method Not Allowed {% endblock title %}

{% block content %}

    <div class="auth-wrapper">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="text-center">
                        <img src="{{ url_for('static', filename='assets/images/error/generic.png') }}" 
                             alt="Error 405" class="img-fluid">
                        <h5 class="text-muted my-4">Oops! Method Not Allowed</h5>
                        <p class="text-muted">The request method is not supported for this route.</p>
                        <a href="{{ url_for('home_blueprint.home') }}" class="btn btn-primary mb-4">
                            <i class="feather icon-home me-2"></i>Back to Home
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

{% endblock content %}
