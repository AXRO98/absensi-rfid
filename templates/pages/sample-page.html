{% extends "layouts/base.html" %}

{% block content %}
<div class="pc-container">
  <div class="pc-content">

    <div class="page-header">
      <h3>User Management</h3>
      <a href="{{ url_for('home_blueprint.add_user') }}" class="btn btn-primary btn-sm">+ Add User</a>
    </div>

    <div class="card mt-3 shadow-sm">
      <div class="card-body">
        <table class="table table-striped table-hover">
          <thead>
            <tr>
              <th>#</th>
              <th>Username</th>
              <th>Email</th>
              <th>Role</th>
            </tr>
          </thead>
          <tbody>
            {% for user in users %}
            <tr>
              <td>{{ loop.index }}</td>
              <td>{{ user.username }}</td>
              <td>{{ user.email }}</td>
              <td><span class="badge bg-info">{{ user.role }}</span></td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>
{% endblock content %}
